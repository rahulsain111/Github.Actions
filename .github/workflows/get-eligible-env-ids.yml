name: Get Eligible Environment IDs

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to check (e.g., cms-2.15.2)'
        required: true
        type: string
      organization_id:
        description: 'Organization ID (optional, defaults to Acquia org)'
        required: false
        type: string
        default: '9509f888-c6af-443c-8dd4-0e13eda9f83b'
      debug:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

jobs:
  get-eligible-envs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up environment
        env:
          CLOUD_API_KEY: ${{ secrets.CLOUD_API_KEY }}
          CLOUD_SECRET_KEY: ${{ secrets.CLOUD_SECRET_KEY }}
        run: |
          echo "CLOUD_API_KEY=$CLOUD_API_KEY" >> $GITHUB_ENV
          echo "CLOUD_SECRET_KEY=$CLOUD_SECRET_KEY" >> $GITHUB_ENV

      - name: Run get-eligible-env-ids.sh
        run: |
          chmod +x get-eligible-env-ids.sh
          
          if [ "${{ inputs.debug }}" = "true" ]; then
            if [ -n "${{ inputs.organization_id }}" ]; then
              ./get-eligible-env-ids.sh -d "${{ inputs.organization_id }}" "${{ inputs.tag_name }}"
            else
              ./get-eligible-env-ids.sh -d "${{ inputs.tag_name }}"
            fi
          else
            if [ -n "${{ inputs.organization_id }}" ]; then
              ./get-eligible-env-ids.sh "${{ inputs.organization_id }}" "${{ inputs.tag_name }}"
            else
              ./get-eligible-env-ids.sh "${{ inputs.tag_name }}"
            fi
          fi
